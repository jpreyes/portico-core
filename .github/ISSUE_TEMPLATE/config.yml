# Issue template chooser configuration.
# https://docs.github.com/en/communities/using-templates-to-encourage-useful-issues-and-pull-requests/configuring-issue-templates-for-your-repository
#
# Blank issues are disabled so every report uses a template (bug / feature).
blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/jpreyes/portico-core/security/policy
    about: Do NOT open a public issue. Report privately following the security policy.
  - name: Question, idea or discussion
    url: https://github.com/jpreyes/portico-core/discussions
    about: For open-ended questions and ideas, start a discussion (enable Discussions in repo settings).
